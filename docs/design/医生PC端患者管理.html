<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医生PC端患者管理</title>
  <style>
    :root {
      --primary: #1677ff;
      --primary-weak: #e6f4ff;
      --success: #22a06b;
      --warning: #faad14;
      --danger: #e5484d;
      --text: #1f2937;
      --text-sub: #5f6b7a;
      --text-weak: #8b95a1;
      --line: #e5e7eb;
      --line-strong: #d7dce3;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --nav: #0f172a;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1280px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      display: grid;
      grid-template-columns: 224px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--nav);
      color: #cbd5e1;
      padding: 18px 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 44px;
      padding: 0 10px 16px;
      color: #fff;
      font-weight: 700;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
    }

    .nav-group {
      margin-top: 18px;
    }

    .nav-title {
      padding: 0 10px 8px;
      color: #718096;
      font-size: 12px;
    }

    .nav-item {
      height: 38px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      border-radius: 7px;
      color: #cbd5e1;
      margin-bottom: 4px;
    }

    .nav-item.active {
      color: #fff;
      background: rgba(22, 119, 255, 0.92);
    }

    .nav-icon {
      width: 18px;
      height: 18px;
      opacity: 0.9;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 18px;
    }

    .nav-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.9;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .main {
      min-width: 0;
    }

    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .page-title {
      font-size: 18px;
      font-weight: 700;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-sub);
    }

    .doctor {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--primary-weak);
      color: var(--primary);
      font-weight: 700;
    }

    .content {
      padding: 20px 24px 28px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .search {
      width: 360px;
      position: relative;
    }

    .search input {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 0 12px 0 34px;
      outline: none;
      background: #fff;
    }

    .search::before {
      content: "⌕";
      position: absolute;
      left: 12px;
      top: 7px;
      color: var(--text-weak);
      font-size: 17px;
    }

    .btn {
      height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn.primary {
      color: #fff;
      border-color: var(--primary);
      background: var(--primary);
    }

    .btn.ghost {
      color: var(--primary);
      border-color: var(--primary);
      background: #fff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(7, minmax(124px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat-card {
      min-height: 82px;
      padding: 13px 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
      position: relative;
    }

    .stat-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.12);
    }

    .stat-title {
      color: var(--text-sub);
      font-size: 13px;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 24px;
      line-height: 1;
      font-weight: 750;
    }

    .stat-note {
      margin-top: 6px;
      color: var(--text-weak);
      font-size: 12px;
    }

    .workbench {
      display: grid;
      grid-template-columns: 256px minmax(620px, 1fr) 400px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .panel-hd {
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }

    .filters {
      padding: 14px;
    }

    .filter-block {
      margin-bottom: 16px;
    }

    .filter-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 600;
    }

    .seg {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      background: var(--surface-soft);
      color: var(--text-sub);
      font-size: 13px;
    }

    .chip.active {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-weak);
      font-weight: 600;
    }

    .list-panel {
      min-width: 0;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th {
      height: 42px;
      color: var(--text-sub);
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .table td,
    .table th {
      padding: 0 12px;
    }

    .table td {
      height: 76px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    .table tr {
      transition: background 0.15s ease;
    }

    .table tbody tr:hover,
    .table tbody tr.active {
      background: #f0f7ff;
    }

    .patient-cell {
      min-width: 174px;
    }

    .patient-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .patient-meta {
      margin-top: 5px;
      color: var(--text-weak);
      font-size: 12px;
    }

    .star {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      color: #c5cbd3;
      font-size: 16px;
      padding: 0;
    }

    .star.on {
      color: #f7b500;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 7px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      margin: 0 4px 4px 0;
    }

    .tag.blue {
      color: #0958d9;
      background: #e6f4ff;
    }

    .tag.green {
      color: #1f7a4d;
      background: #eaf7f0;
    }

    .tag.orange {
      color: #ad6800;
      background: #fff7e6;
    }

    .tag.red {
      color: #cf1322;
      background: #fff1f0;
    }

    .tag.gray {
      color: #5f6b7a;
      background: #f1f5f9;
    }

    .metric-line {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--text-sub);
      font-size: 12px;
    }

    .metric-line b {
      color: var(--text);
      font-size: 13px;
    }

    .status-text {
      display: grid;
      gap: 4px;
      color: var(--text-sub);
      font-size: 12px;
    }

    .status-text b {
      color: var(--text);
      font-size: 13px;
    }

    .action-link {
      border: none;
      padding: 0;
      background: transparent;
      color: var(--primary);
      font-weight: 600;
    }

    .detail {
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 98px);
      overflow: auto;
    }

    .detail::-webkit-scrollbar {
      width: 8px;
    }

    .detail::-webkit-scrollbar-thumb {
      background: #d6dbe3;
      border-radius: 8px;
    }

    .patient-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .head-main {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .head-name {
      font-size: 20px;
      font-weight: 760;
    }

    .head-meta {
      margin-top: 6px;
      color: var(--text-sub);
    }

    .score {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--warning) 0 64%, #edf1f6 64% 100%);
    }

    .score-inner {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      line-height: 1;
      font-weight: 800;
      color: var(--warning);
    }

    .score-inner small {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: var(--text-weak);
      font-weight: 500;
      text-align: center;
    }

    .detail-section {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .section-title {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .summary-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
    }

    .summary-label {
      color: var(--text-weak);
      font-size: 12px;
    }

    .summary-value {
      margin-top: 6px;
      font-weight: 750;
      font-size: 18px;
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .event {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      font-size: 13px;
    }

    .event-time {
      color: var(--text-weak);
    }

    .event-main {
      padding-left: 12px;
      border-left: 2px solid #e2e8f0;
    }

    .event-main b {
      display: block;
      margin-bottom: 4px;
    }

    .progress {
      height: 8px;
      border-radius: 8px;
      background: #edf1f6;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--primary);
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px 16px 0;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      height: 34px;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-sub);
      background: transparent;
      font-weight: 600;
    }

    .tab.active {
      color: var(--primary);
      border-color: var(--primary);
    }

    .drawer-mask {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(15, 23, 42, 0.36);
      z-index: 50;
    }

    .drawer-mask.show {
      display: grid;
    }

    .modal {
      width: 420px;
      border-radius: 10px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-hd {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }

    .modal-body {
      padding: 20px;
      text-align: center;
    }

    .qr {
      width: 180px;
      height: 180px;
      margin: 8px auto 16px;
      padding: 14px;
      background:
        linear-gradient(90deg, #111 12px, transparent 12px) 0 0 / 36px 36px,
        linear-gradient(#111 12px, transparent 12px) 0 0 / 36px 36px,
        #fff;
      border: 10px solid #fff;
      box-shadow: 0 0 0 1px var(--line);
    }

    .modal-ft {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 18px;
      background: #f8fafc;
      border-top: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">

      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="page-title">患者管理</div>
        <div class="top-actions">
          <span>杭州市社区慢病中心</span>
          <span>消息 3</span>
          <div class="doctor">
            <div class="avatar">林</div>
            <span>林医生</span>
          </div>
        </div>
      </header>

      <section class="content">
        <div class="toolbar">
          <div class="search">
            <input id="searchInput" type="search" placeholder="搜索姓名 / 手机号 / 患者ID / 设备号">
          </div>
          <div>
            <button class="btn" id="refreshBtn">刷新</button>
            <button class="btn primary" id="addPatientBtn">＋ 添加患者</button>
          </div>
        </div>

        <div class="stats" id="stats"></div>

        <div class="workbench">
          <aside class="panel">
            <div class="panel-hd">
              <span>筛选条件</span>
              <button class="action-link" id="clearFilters">清空</button>
            </div>
            <div class="filters" id="filters"></div>
          </aside>

          <section class="panel list-panel">
            <div class="panel-hd">
              <span id="listTitle">全部患者</span>
              <span style="color: var(--text-weak); font-weight: 500;" id="listCount"></span>
            </div>
            <table class="table">
              <thead>
                <tr>
                  <th>患者</th>
                  <th>疾病标签</th>
                  <th>今日状态</th>
                  <th>关键指标</th>
                  <th>方案/随访</th>
                  <th>最新预警</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="patientRows"></tbody>
            </table>
          </section>

          <aside class="panel detail" id="detail"></aside>
        </div>
      </section>
    </main>
  </div>

  <div class="drawer-mask" id="qrModal">
    <div class="modal">
      <div class="modal-hd">
        <span>添加患者</span>
        <button class="action-link" id="closeModal">关闭</button>
      </div>
      <div class="modal-body">
        <div class="qr"></div>
        <div style="font-weight: 700;">请患者使用微信扫码授权绑定</div>
        <p style="margin: 8px 0 0; color: var(--text-sub); line-height: 1.6;">
          二维码有效期 10 分钟。患者确认后，将出现在患者管理列表。
        </p>
      </div>
      <div class="modal-ft">
        <button class="btn" id="cancelModal">取消</button>
        <button class="btn primary">重新生成二维码</button>
      </div>
    </div>
  </div>

        risk: "高风险",
        score: 55,
        diseaseRisk: ["睡眠呼吸障碍风险"],
        confirmed: ["睡眠呼吸障碍", "高血压"],
        plan: "需调整",
        follow: "逾期 1 天",
        data: "设备同步异常",
        task: 42,
        alert: { level: "重要", title: "CPAP 连续 3 天未同步", time: "昨日" },
        metrics: { glucose: "-", bp: "166/98", spo2: "93%", sleep: "AHI 36.2" },
        timeline: [
          ["昨日", "设备同步异常", "CPAP 使用数据连续 3 天未同步。"],
          ["05.15", "睡眠报告", "AHI 36.2，最低血氧 82%。"],
          ["05.14", "血压记录", "166/98 mmHg。"]
        ]
      },
      {
        id: "P20260514007",
        name: "王琴",
        sex: "女",
        age: 64,
        phone: "137****9217",
        bindAt: "2026-05-14 18:33",
        focus: false,
        risk: "低风险",
        score: 88,
        diseaseRisk: ["高血压风险"],
        confirmed: ["高血压"],
        plan: "执行中",
        follow: "06.02 常规随访",
        data: "今日未记录",
        task: 75,
        alert: { level: "提醒", title: "今日血压任务未完成", time: "12:00" },
        metrics: { glucose: "-", bp: "132/84", spo2: "97%", sleep: "6.8h" },
        timeline: [
          ["12:00", "任务提醒", "今日晨起血压未完成。"],
          ["昨日", "血压记录", "132/84 mmHg，状态稳定。"],
          ["05.10", "方案下发", "高血压低风险 30 天管理方案。"]
        ]
      },
      {
        id: "P20260512004",
        name: "赵强",
        sex: "男",
        age: 61,
        phone: "135****6182",
        bindAt: "2026-05-12 08:19",
        focus: false,
        risk: "中风险",
        score: 74,
        diseaseRisk: ["糖尿病风险", "慢阻肺风险"],
        confirmed: ["糖尿病"],
        plan: "无方案",
        follow: "未安排",
        data: "连续缺失",
        task: 18,
        alert: { level: "重要", title: "关键记录连续 3 天缺失", time: "09:00" },
        metrics: { glucose: "7.6", bp: "138/86", spo2: "95%", sleep: "-" },
        timeline: [
          ["09:00", "数据缺失", "关键记录任务连续 3 天未完成。"],
          ["05.09", "血糖记录", "空腹 7.6 mmol/L。"],
          ["05.08", "完成筛查", "提示糖尿病和慢阻肺风险。"]
        ]
      }
    ];

    const state = {
      quick: "全部患者",
      filters: {},
      selectedId: patients[0].id,
      search: ""
    };

    const statDefs = [
      ["全部患者", p => true],
      ["高风险", p => p.risk === "高风险"],
      ["今日随访", p => p.follow.includes("今日")],
      ["数据缺失", p => p.data.includes("缺失") || p.data.includes("未记录")],
      ["待确认疾病", p => p.diseaseRisk.length > p.confirmed.length],
      ["待确认方案", p => p.plan === "系统已生成待医生确认"],
      ["待处理预警", p => ["重要", "紧急"].includes(p.alert.level)]
    ];

    const filterDefs = [
      ["重点关注", ["全部", "仅看重点关注"]],
      ["风险等级", ["全部", "低风险", "中风险", "高风险"]],
      ["疾病风险标签", ["全部", "糖尿病风险", "慢阻肺风险", "睡眠呼吸障碍风险"]],
      ["确诊疾病", ["全部", "糖尿病", "慢阻肺", "睡眠呼吸障碍", "高血压", "多病共管"]],
      ["方案状态", ["全部", "无方案", "系统已生成待医生确认", "执行中", "需调整", "待复盘"]],
      ["随访状态", ["全部", "今日", "本周", "逾期", "未安排"]],
      ["数据状态", ["全部", "今日已记录", "今日未记录", "连续缺失", "设备同步异常"]]
    ];

    function levelTag(level) {
      if (level === "紧急") return "red";
      if (level === "重要") return "orange";
      return "blue";
    }

    function riskTag(risk) {
      if (risk === "高风险") return "red";
      if (risk === "中风险") return "orange";
      return "green";
    }

    function matchesQuick(patient) {
      const def = statDefs.find(item => item[0] === state.quick);
      return !def || def[1](patient);
    }

    function matchesFilters(patient) {
      return Object.entries(state.filters).every(([key, value]) => {
        if (!value || value === "全部") return true;
        if (key === "重点关注") return value === "仅看重点关注" ? patient.focus : true;
        if (key === "风险等级") return patient.risk === value;
        if (key === "疾病风险标签") return patient.diseaseRisk.includes(value);
        if (key === "确诊疾病") {
          if (value === "多病共管") return patient.confirmed.length > 1;
          return patient.confirmed.includes(value);
        }
        if (key === "方案状态") return patient.plan === value;
        if (key === "随访状态") return patient.follow.includes(value);
        if (key === "数据状态") return patient.data === value;
        return true;
      });
    }

    function filteredPatients() {
      const keyword = state.search.trim();
      return patients
        .filter(matchesQuick)
        .filter(matchesFilters)
        .filter(patient => {
          if (!keyword) return true;
          return [patient.name, patient.phone, patient.id].some(v => v.includes(keyword));
        })
        .sort((a, b) => b.bindAt.localeCompare(a.bindAt));
    }

    function renderStats() {
      const box = document.getElementById("stats");
      box.innerHTML = statDefs.map(([name, predicate]) => {
        const count = patients.filter(predicate).length;
        const active = state.quick === name ? "active" : "";
        return `
          <button class="stat-card ${active}" data-stat="${name}">
            <div class="stat-title">${name}</div>
            <div class="stat-value">${count}</div>
            <div class="stat-note">${name === "全部患者" ? "点击清空筛选" : "点击快捷筛选"}</div>
          </button>
        `;
      }).join("");

      box.querySelectorAll("[data-stat]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.quick = btn.dataset.stat;
          if (state.quick === "全部患者") state.filters = {};
          render();
        });
      });
    }

    function renderFilters() {
      const box = document.getElementById("filters");
      box.innerHTML = filterDefs.map(([name, options]) => `
        <div class="filter-block">
          <span class="filter-label">${name}</span>
          <div class="seg">
            ${options.map(option => {
              const active = (state.filters[name] || "全部") === option ? "active" : "";
              return `<button class="chip ${active}" data-filter="${name}" data-value="${option}">${option}</button>`;
            }).join("")}
          </div>
        </div>
      `).join("");

      box.querySelectorAll("[data-filter]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.filters[btn.dataset.filter] = btn.dataset.value;
          render();
        });
      });
    }

    function renderRows() {
      const rows = filteredPatients();
      document.getElementById("listTitle").textContent = state.quick;
      document.getElementById("listCount").textContent = `${rows.length} 位患者，按绑定时间倒序`;

      const tbody = document.getElementById("patientRows");
      tbody.innerHTML = rows.map(patient => `
        <tr class="${patient.id === state.selectedId ? "active" : ""}" data-id="${patient.id}">
          <td class="patient-cell">
            <div class="patient-name">
              <button class="star ${patient.focus ? "on" : ""}" data-star="${patient.id}">★</button>
              <span>${patient.name}</span>
              <span class="tag ${riskTag(patient.risk)}">${patient.risk}</span>
            </div>
            <div class="patient-meta">${patient.sex} · ${patient.age}岁 · ${patient.phone}</div>
            <div class="patient-meta">绑定 ${patient.bindAt}</div>
          </td>
          <td>
            ${patient.confirmed.map(item => `<span class="tag blue">${item}</span>`).join("")}
            ${patient.diseaseRisk.map(item => `<span class="tag gray">${item}</span>`).join("")}
          </td>
          <td>
            <div class="status-text">
              <b>任务完成 ${patient.task}%</b>
              <span>${patient.data}</span>
              <div class="progress"><span style="width:${patient.task}%"></span></div>
            </div>
          </td>
          <td>
            <div class="metric-line">
              <span>血糖 <b>${patient.metrics.glucose}</b></span>
              <span>血压 <b>${patient.metrics.bp}</b></span>
              <span>SpO2 <b>${patient.metrics.spo2}</b></span>
              <span>睡眠 <b>${patient.metrics.sleep}</b></span>
            </div>
          </td>
          <td>
            <div class="status-text">
              <b>${patient.plan}</b>
              <span>${patient.follow}</span>
            </div>
          </td>
          <td>
            <span class="tag ${levelTag(patient.alert.level)}">${patient.alert.level}</span>
            <div class="status-text" style="margin-top: 4px;">
              <b>${patient.alert.title}</b>
              <span>${patient.alert.time}</span>
            </div>
          </td>
          <td><button class="action-link" data-view="${patient.id}">查看详情</button></td>
        </tr>
      `).join("");

      tbody.querySelectorAll("tr[data-id]").forEach(row => {
        row.addEventListener("click", event => {
          if (event.target.dataset.star) return;
          state.selectedId = row.dataset.id;
          render();
        });
      });
      tbody.querySelectorAll("[data-view]").forEach(btn => {
        btn.addEventListener("click", event => {
          event.stopPropagation();
          state.selectedId = btn.dataset.view;
          render();
        });
      });
      tbody.querySelectorAll("[data-star]").forEach(btn => {
        btn.addEventListener("click", event => {
          event.stopPropagation();
          const patient = patients.find(item => item.id === btn.dataset.star);
          patient.focus = !patient.focus;
          render();
        });
      });
    }

    function renderDetail() {
      const patient = patients.find(item => item.id === state.selectedId) || filteredPatients()[0] || patients[0];
      if (!patient) return;
      state.selectedId = patient.id;
      document.getElementById("detail").innerHTML = `
        <div class="patient-head">
          <div class="head-main">
            <div>
              <div class="head-name">${patient.name}</div>
              <div class="head-meta">${patient.sex} · ${patient.age}岁 · ${patient.phone}</div>
              <div style="margin-top: 10px;">
                <span class="tag ${riskTag(patient.risk)}">${patient.risk}</span>
                ${patient.confirmed.map(item => `<span class="tag blue">${item}</span>`).join("")}
              </div>
            </div>
            <div class="score">
              <div class="score-inner">${patient.score}<small>健康分</small></div>
            </div>
          </div>
        </div>
        <div class="tabs">
          <button class="tab active">总览</button>
          <button class="tab">趋势</button>
          <button class="tab">记录</button>
          <button class="tab">随访</button>
        </div>
        <div class="detail-section">
          <div class="section-title">
            <span>当前状态</span>
            <button class="btn ghost" style="height: 30px;">进入患者360</button>
          </div>
          <div class="summary-grid">
            <div class="summary-card">
              <div class="summary-label">方案状态</div>
              <div class="summary-value" style="font-size:15px;">${patient.plan}</div>
            </div>
            <div class="summary-card">
              <div class="summary-label">下次随访</div>
              <div class="summary-value" style="font-size:15px;">${patient.follow}</div>
            </div>
            <div class="summary-card">
              <div class="summary-label">今日任务</div>
              <div class="summary-value">${patient.task}%</div>
            </div>
            <div class="summary-card">
              <div class="summary-label">最新预警</div>
              <div class="summary-value" style="font-size:15px;">
                <span class="tag ${levelTag(patient.alert.level)}">${patient.alert.level}</span>
              </div>
            </div>
          </div>
        </div>
        <div class="detail-section">
          <div class="section-title">关键指标</div>
          <div class="summary-grid">
            <div class="summary-card"><div class="summary-label">血糖</div><div class="summary-value">${patient.metrics.glucose}</div></div>
            <div class="summary-card"><div class="summary-label">血压</div><div class="summary-value">${patient.metrics.bp}</div></div>
            <div class="summary-card"><div class="summary-label">SpO2</div><div class="summary-value">${patient.metrics.spo2}</div></div>
            <div class="summary-card"><div class="summary-label">睡眠</div><div class="summary-value">${patient.metrics.sleep}</div></div>
          </div>
        </div>
        <div class="detail-section">
          <div class="section-title">最近时间轴</div>
          <div class="timeline">
            ${patient.timeline.map(event => `
              <div class="event">
                <div class="event-time">${event[0]}</div>
                <div class="event-main"><b>${event[1]}</b><span>${event[2]}</span></div>
              </div>
            `).join("")}
          </div>
        </div>
        <div class="detail-section">
          <div class="section-title">快捷动作</div>
          <div style="display:flex; flex-wrap:wrap; gap:8px;">
            <button class="btn primary">处理预警</button>
            <button class="btn">创建随访</button>
            <button class="btn">发送建议</button>
            <button class="btn">调整方案</button>
          </div>
        </div>
      `;
    }

    function render() {
      renderStats();
      renderFilters();
      renderRows();
      renderDetail();
    }

    document.getElementById("searchInput").addEventListener("input", event => {
      state.search = event.target.value;
      render();
    });
    document.getElementById("clearFilters").addEventListener("click", () => {
      state.quick = "全部患者";
      state.filters = {};
      state.search = "";
      document.getElementById("searchInput").value = "";
      render();
    });
    document.getElementById("refreshBtn").addEventListener("click", render);
    document.getElementById("addPatientBtn").addEventListener("click", () => {
      document.getElementById("qrModal").classList.add("show");
    });
    document.getElementById("closeModal").addEventListener("click", () => {
      document.getElementById("qrModal").classList.remove("show");
    });
    document.getElementById("cancelModal").addEventListener("click", () => {
      document.getElementById("qrModal").classList.remove("show");
    });
    document.getElementById("qrModal").addEventListener("click", event => {
      if (event.target.id === "qrModal") event.currentTarget.classList.remove("show");
    });

    render();
  </script>
</body>
</html>
