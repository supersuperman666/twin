<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医生PC端患者管理</title>
  <style>
    :root {
      --primary: #1677ff;
      --primary-weak: #e6f4ff;
      --success: #22a06b;
      --warning: #faad14;
      --danger: #e5484d;
      --text: #1f2937;
      --text-sub: #5f6b7a;
      --text-weak: #8b95a1;
      --line: #e5e7eb;
      --line-strong: #d7dce3;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --nav: #0f172a;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1280px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      display: grid;
      grid-template-columns: 224px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--nav);
      color: #cbd5e1;
      padding: 18px 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 44px;
      padding: 0 10px 16px;
      color: #fff;
      font-weight: 700;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
    }

    .nav-group {
      margin-top: 18px;
    }

    .nav-title {
      padding: 0 10px 8px;
      color: #718096;
      font-size: 12px;
    }

    .nav-item {
      height: 38px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      border-radius: 7px;
      color: #cbd5e1;
      margin-bottom: 4px;
    }

    .nav-item.active {
      color: #fff;
      background: rgba(22, 119, 255, 0.92);
    }

    .nav-icon {
      width: 18px;
      height: 18px;
      opacity: 0.9;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 18px;
    }

    .nav-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.9;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .main {
      min-width: 0;
    }

    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .page-title {
      font-size: 18px;
      font-weight: 700;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-sub);
    }

    .doctor {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--primary-weak);
      color: var(--primary);
      font-weight: 700;
    }

    .content {
      padding: 20px 24px 28px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .search {
      width: 360px;
      position: relative;
    }

    .search input {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 0 12px 0 34px;
      outline: none;
      background: #fff;
    }

    .search::before {
      content: "⌕";
      position: absolute;
      left: 12px;
      top: 7px;
      color: var(--text-weak);
      font-size: 17px;
    }

    .btn {
      height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn.primary {
      color: #fff;
      border-color: var(--primary);
      background: var(--primary);
    }

    .btn.ghost {
      color: var(--primary);
      border-color: var(--primary);
      background: #fff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(7, minmax(124px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat-card {
      min-height: 82px;
      padding: 13px 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
      position: relative;
    }

    .stat-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.12);
    }

    .stat-title {
      color: var(--text-sub);
      font-size: 13px;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 24px;
      line-height: 1;
      font-weight: 750;
    }

    .stat-note {
      margin-top: 6px;
      color: var(--text-weak);
      font-size: 12px;
    }

    .workbench {
      display: grid;
      grid-template-columns: 256px minmax(620px, 1fr) 400px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .panel-hd {
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }

    .filters {
      padding: 14px;
    }

    .filter-block {
      margin-bottom: 16px;
    }

    .filter-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 600;
    }

    .seg {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      background: var(--surface-soft);
      color: var(--text-sub);
      font-size: 13px;
    }

    .chip.active {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-weak);
      font-weight: 600;
    }

    .list-panel {
      min-width: 0;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th {
      height: 42px;
      color: var(--text-sub);
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .table td,
    .table th {
      padding: 0 12px;
    }

    .table td {
      height: 76px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    .table tr {
      transition: background 0.15s ease;
    }

    .table tbody tr:hover,
    .table tbody tr.active {
      background: #f0f7ff;
    }

    .patient-cell {
      min-width: 174px;
    }

    .patient-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .patient-meta {
      margin-top: 5px;
      color: var(--text-weak);
      font-size: 12px;
    }

    .star {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      color: #c5cbd3;
      font-size: 16px;
      padding: 0;
    }

    .star.on {
      color: #f7b500;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 7px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      margin: 0 4px 4px 0;
    }

    .tag.blue {
      color: #0958d9;
      background: #e6f4ff;
    }

    .tag.green {
      color: #1f7a4d;
      background: #eaf7f0;
    }

    .tag.orange {
      color: #ad6800;
      background: #fff7e6;
    }

    .tag.red {
      color: #cf1322;
      background: #fff1f0;
    }

    .tag.gray {
      color: #5f6b7a;
      background: #f1f5f9;
    }

    .metric-line {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--text-sub);
      font-size: 12px;
    }

    .metric-line b {
      color: var(--text);
      font-size: 13px;
    }

    .status-text {
      display: grid;
      gap: 4px;
      color: var(--text-sub);
      font-size: 12px;
    }

    .status-text b {
      color: var(--text);
      font-size: 13px;
    }

    .action-link {
      border: none;
      padding: 0;
      background: transparent;
      color: var(--primary);
      font-weight: 600;
    }

    .detail {
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 98px);
      overflow: auto;
    }

    .detail::-webkit-scrollbar {
      width: 8px;
    }

    .detail::-webkit-scrollbar-thumb {
      background: #d6dbe3;
      border-radius: 8px;
    }

    .patient-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .head-main {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .head-name {
      font-size: 20px;
      font-weight: 760;
    }

    .head-meta {
      margin-top: 6px;
      color: var(--text-sub);
    }

    .score {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--warning) 0 64%, #edf1f6 64% 100%);
    }

    .score-inner {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      line-height: 1;
      font-weight: 800;
      color: var(--warning);
    }

    .score-inner small {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: var(--text-weak);
      font-weight: 500;
      text-align: center;
    }

    .detail-section {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .section-title {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .summary-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
    }

    .summary-label {
      color: var(--text-weak);
      font-size: 12px;
    }

    .summary-value {
      margin-top: 6px;
      font-weight: 750;
      font-size: 18px;
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .event {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      font-size: 13px;
    }

    .event-time {
      color: var(--text-weak);
    }

    .event-main {
      padding-left: 12px;
      border-left: 2px solid #e2e8f0;
    }

    .event-main b {
      display: block;
      margin-bottom: 4px;
    }

    .progress {
      height: 8px;
      border-radius: 8px;
      background: #edf1f6;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--primary);
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px 16px 0;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      height: 34px;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-sub);
      background: transparent;
      font-weight: 600;
    }

    .tab.active {
      color: var(--primary);
      border-color: var(--primary);
    }

    .drawer-mask {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(15, 23, 42, 0.36);
      z-index: 50;
    }

    .drawer-mask.show {
      display: grid;
    }

    .modal {
      width: 420px;
      border-radius: 10px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-hd {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }

    .modal-body {
      padding: 20px;
      text-align: center;
    }

    .qr {
      width: 180px;
      height: 180px;
      margin: 8px auto 16px;
      padding: 14px;
      background:
        linear-gradient(90deg, #111 12px, transparent 12px) 0 0 / 36px 36px,
        linear-gradient(#111 12px, transparent 12px) 0 0 / 36px 36px,
        #fff;
      border: 10px solid #fff;
      box-shadow: 0 0 0 1px var(--line);
    }

    .modal-ft {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 18px;
      background: #f8fafc;
      border-top: 1px solid var(--line);
    }

    .module-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 16px;
      align-items: start;
    }

    .module-main {
      display: grid;
      gap: 16px;
    }

    .module-side {
      position: sticky;
      top: 82px;
      display: grid;
      gap: 16px;
    }

    .sub-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .seg-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-card-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .metric-card .label {
      color: var(--text-sub);
      font-size: 12px;
    }

    .metric-card .value {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 800;
    }

    .card-list {
      display: grid;
      gap: 12px;
    }

    .flow-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.03);
    }

    .flow-card.urgent {
      border-left: 4px solid var(--danger);
    }

    .flow-card.important {
      border-left: 4px solid var(--warning);
    }

    .flow-card.active-plan {
      border-left: 4px solid var(--primary);
    }

    .flow-card.done {
      border-left: 4px solid var(--success);
      background: #fbfffd;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-title {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
    }

    .card-desc {
      margin: 8px 0 0;
      color: var(--text-sub);
      line-height: 1.55;
    }

    .evidence-list {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .evidence-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      background: var(--surface-soft);
      color: var(--text-sub);
      font-size: 13px;
    }

    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .timeline-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .empty {
      padding: 28px;
      text-align: center;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      color: var(--text-weak);
      background: var(--surface);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      text-align: left;
    }

    .form-field {
      display: grid;
      gap: 6px;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    .form-field label {
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 700;
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
    }

    .form-field textarea {
      min-height: 84px;
      resize: vertical;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      min-width: 240px;
      padding: 12px 16px;
      border-radius: 8px;
      color: #fff;
      background: #0f172a;
      box-shadow: var(--shadow);
      z-index: 80;
      transform: translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">慢</div>
        <div>数字孪生医生端</div>
      </div>
      <div class="nav-group">
        <div class="nav-title">工作台</div>
        <div class="nav-item" data-view="dashboard"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg></span>首页</div>
        <div class="nav-item active" data-view="patients"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="9.5" cy="7" r="4"/><path d="M17 8h4"/><path d="M19 6v4"/><path d="M17 16h4"/></svg></span>患者管理</div>
        <div class="nav-item" data-view="alerts"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.9 2.6 18a2 2 0 0 0 1.8 3h15.2a2 2 0 0 0 1.8-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg></span>预警中心</div>
        <div class="nav-item" data-view="followups"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/><path d="m9 16 2 2 4-4"/></svg></span>随访管理</div>
      </div>
      <div class="nav-group">
        <div class="nav-title">管理</div>
        <div class="nav-item" data-view="plans"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="m3 6 .8.8L5.5 5"/><path d="m3 12 .8.8 1.7-1.8"/><path d="m3 18 .8.8 1.7-1.8"/></svg></span>管理方案</div>
        <div class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 7h6"/><path d="m8 12 2 2 4-4"/><path d="M8 17h8"/></svg></span>任务管理</div>
        <div class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M10 7h4"/><path d="M12 17h.01"/><path d="M4 8v8"/><path d="M20 8v8"/></svg></span>设备与报告</div>
        <div class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><rect x="7" y="11" width="3" height="5" rx="1"/><rect x="12" y="7" width="3" height="9" rx="1"/><rect x="17" y="9" width="3" height="7" rx="1"/></svg></span>数据看板</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="page-title">患者管理</div>
        <div class="top-actions">
          <span>杭州市社区慢病中心</span>
          <span>消息 3</span>
          <div class="doctor">
            <div class="avatar">林</div>
            <span>林医生</span>
          </div>
        </div>
      </header>

      <section class="content">
        <div class="toolbar">
          <div class="search">
            <input id="searchInput" type="search" placeholder="搜索姓名 / 手机号 / 患者ID / 设备号">
          </div>
          <div>
            <button class="btn" id="refreshBtn">刷新</button>
            <button class="btn primary" id="addPatientBtn">＋ 添加患者</button>
          </div>
        </div>

        <div class="stats" id="stats"></div>

        <div class="workbench">
          <aside class="panel">

      if (level === "紧急") return "red";
      if (level === "重要") return "orange";
      return "blue";
    }

    function riskTag(risk) {
      if (risk === "高风险") return "red";
      if (risk === "中风险") return "orange";
      return "green";
    }

    function matchesQuick(patient) {
      const def = statDefs.find(item => item[0] === state.quick);
      return !def || def[1](patient);
    }

    function matchesFilters(patient) {
      return Object.entries(state.filters).every(([key, value]) => {
        if (!value || value === "全部") return true;
        if (key === "重点关注") return value === "仅看重点关注" ? patient.focus : true;
        if (key === "风险等级") return patient.risk === value;
        if (key === "疾病风险标签") return patient.diseaseRisk.includes(value);
        if (key === "确诊疾病") {
          if (value === "多病共管") return patient.confirmed.length > 1;
          return patient.confirmed.includes(value);
        }
        if (key === "方案状态") return patient.plan === value;
        if (key === "随访状态") return patient.follow.includes(value);
        if (key === "数据状态") return patient.data === value;
        return true;
      });
    }

      const keyword = state.search.trim();
      return patients
        .filter(matchesQuick)
        .filter(matchesFilters)
        .filter(patient => {
          if (!keyword) return true;
          return [patient.name, patient.phone, patient.id].some(v => v.includes(keyword));

        .sort((a, b) => b.bindAt.localeCompare(a.bindAt));
    }

            <div class="stat-note">${name === "全部患者" ? "点击清空筛选" : "点击快捷筛选"}</div>

          state.quick = btn.dataset.stat;
          if (state.quick === "全部患者") state.filters = {};
          render();
        });
      });

        btn.addEventListener("click", () => {
          state.filters[btn.dataset.filter] = btn.dataset.value;
          render();
        });
      });
    }

      function sidePanel() {
        const p = patientOf(app.selectedId) || patientData[0];
        return `<section class="flow-card"><h3 class="card-title">当前患者</h3><p class="card-desc">${p.name} · ${p.risk} · 健康分 ${p.score}</p><div class="evidence-list"><div class="evidence-item"><span>方案</span><b>${planOf(p)?.status || "无方案"}</b></div><div class="evidence-item"><span>随访</span><b>${followOf(p)?.status || "未安排"}</b></div><div class="evidence-item"><span>预警</span><b>${openAlerts().filter(a => a.patientId === p.id).length} 条待处理</b></div></div></section><section class="flow-card"><h3 class="card-title">患者时间轴</h3>${timeline(p.id)}</section>`;
      }

      function renderDashboard() {
        shell("患者 360 总览", `<div class="mini-card-grid"><div class="metric-card"><div class="label">待处理预警</div><div class="value">${openAlerts().length}</div></div><div class="metric-card"><div class="label">待确认方案</div><div class="value">${planData.filter(p => p.status === "待医生确认").length}</div></div><div class="metric-card"><div class="label">今日随访</div><div class="value">${followData.filter(f => f.time.includes("今日")).length}</div></div><div class="metric-card"><div class="label">高风险患者</div><div class="value">${patientData.filter(p => p.risk === "高风险").length}</div></div></div><div class="module-grid" style="margin-top:16px;"><section class="module-main card-list">${patientData.slice(0,4).map(p => `<div class="flow-card"><div class="card-top"><div><h3 class="card-title">${p.name}</h3><p class="card-desc">${p.confirmed.join("、") || p.diseaseRisk.join("、")} · ${p.data}</p></div><span class="tag ${riskTag(p.risk)}">${p.risk}</span></div><div class="action-row"><button class="btn primary" data-select="${p.id}" data-nav="patients">查看患者</button></div></div>`).join("")}</section><aside class="module-side">${sidePanel()}</aside></div>`);
      }

      function approvePlan(id, edited = false) {
        const plan = planData.find(p => p.id === id);
        const patient = patientOf(plan.patientId);
        plan.status = "已下发待患者确认";
        plan.version += edited ? 1 : 0;
        plan.patientAck = "待患者确认";
        plan.changes.unshift(edited ? "医生修改后下发" : "医生整体采纳系统草稿");
        addEvent(patient.id, "方案", "医生确认下发", `${plan.name} 已下发至患者端，等待患者确认执行。`);
        showModal("模拟患者确认执行", `<p style="line-height:1.7;">方案已推送到患者端。为跑通前端闭环，可模拟患者点击“我已知晓并开始执行”。</p>`, () => {
          plan.status = "执行中";
          plan.patientAck = "已确认 刚刚";
          patient.task = Math.max(patient.task, 68);
          addEvent(patient.id, "方案", "患者确认执行", `${plan.name} 进入执行中，已生成今日待办和计划内随访。`);
          saveFollowup(patient.id, "计划内随访", "7 天后 10:00", "小程序问卷");
          toast("方案已进入执行中，待办和随访已生成");
        }, "模拟确认");
      }

      function createPlan(patientId, alertId, silent = false) {
        const p = patientOf(patientId);
        const id = `PL${Date.now()}`;
        const disease = p.confirmed[0] || "多病共管";
        const plan = { id, patientId, name: `${disease}中风险 14 天管理方案`, status: "待医生确认", version: 1, source: alertId ? "预警后生成" : "医生创建", target: "提升关键指标记录完整度，降低近期异常风险", modules: ["关键指标每日记录", "症状出现时记录", "7 天后随访", "核心安全预警"], changes: ["系统根据当前风险生成草稿"], patientAck: "未下发" };
        planData.unshift(plan);
        p.planId = id;
        addEvent(patientId, "方案", "生成方案草稿", `${plan.name} 已生成，待医生审核确认。`);
        if (!silent) toast("已生成管理方案草稿，等待医生审核确认");
      }

      function saveFollowup(patientId, type, time, method) {
        const id = `F${Date.now()}`;
        followData.unshift({ id, patientId, type, status: "待患者准备", planId: patientOf(patientId).planId, time, method, prepare: 0, purpose: `${type}：复盘异常证据和方案执行`, conclusion: "" });
        patientOf(patientId).followId = id;
        addEvent(patientId, "随访", "创建随访", `${type}已创建，计划 ${time}，方式 ${method}。`);
        toast("随访已创建，并生成患者端准备任务");
      }

      function handleAlert(id) {
        const alert = alertData.find(a => a.id === id);
        if (!alert) return toast("当前患者暂无待处理预警");
        const p = patientOf(alert.patientId);
        showModal("处理预警", `<div class="form-grid"><div class="form-field full"><label>处理意见</label><textarea id="opinion">已查看证据，建议患者立即复测并补充症状；必要时线下就医。</textarea></div><div class="form-field"><label>后续动作</label><select id="nextAction"><option>创建随访</option><option>发送医嘱与指导</option><option>调整管理方案</option><option>关闭预警</option></select></div><div class="form-field"><label>患者</label><input value="${p.name}" disabled></div></div>`, modal => {
          const next = modal.querySelector("#nextAction").value;
          alert.status = "已处理";
          addEvent(p.id, "预警", "预警已处理", `${alert.title}：${next}。`);
          if (next === "创建随访") saveFollowup(p.id, "预警后随访", "明日 10:00", "电话");
          if (next === "调整管理方案") createPlan(p.id, alert.id, true);
          toast("预警已处理，后续动作已写入时间轴");
        }, "保存处理");
      }

      function showFollowModal(patientId) {
        const p = patientOf(patientId);
        showModal("创建随访", `<div class="form-grid"><div class="form-field"><label>随访类型</label><select id="followType"><option>预警后随访</option><option>计划内随访</option><option>方案复盘</option><option>临时随访</option></select></div><div class="form-field"><label>计划时间</label><input id="followTime" value="明日 10:00"></div><div class="form-field"><label>方式</label><select id="followMethod"><option>电话</option><option>小程序问卷</option><option>线下</option><option>医生端记录</option></select></div><div class="form-field"><label>患者</label><input value="${p.name}" disabled></div><div class="form-field full"><label>患者端说明</label><textarea>请在随访前完成记录和报告同步，医生将复盘当前管理方案执行情况。</textarea></div></div>`, modal => saveFollowup(p.id, modal.querySelector("#followType").value, modal.querySelector("#followTime").value, modal.querySelector("#followMethod").value), "确认创建");
      }

      function completeFollow(id) {
        const f = followData.find(item => item.id === id);
        showModal("记录随访结论", `<div class="form-grid"><div class="form-field"><label>指标判断</label><select><option>稳定</option><option>改善</option><option>恶化</option><option>资料不足</option></select></div><div class="form-field"><label>医生结论</label><select id="conclusion"><option>继续当前方案</option><option>调整管理方案</option><option>资料不足</option><option>需要复诊/转诊</option><option>结束本阶段</option></select></div><div class="form-field full"><label>患者端建议</label><textarea>请继续按方案完成记录，若出现明显不适及时线下就医。</textarea></div></div>`, modal => {
          const conclusion = modal.querySelector("#conclusion").value;
          f.status = conclusion === "调整管理方案" ? "已转方案调整" : "已完成";
          f.conclusion = conclusion;
          f.prepare = Math.max(f.prepare, 90);
          addEvent(f.patientId, "随访", "随访已完成", `${f.type} 结论：${conclusion}。`);
          if (conclusion === "调整管理方案") createPlan(f.patientId, null, true);
          if (conclusion === "资料不足") addEvent(f.patientId, "随访", "生成补充任务", "已生成补充记录/报告上传任务。");
          toast("随访结论已保存，后续动作已生成");
        }, "保存结论");
      }

      function bindActions() {
        document.querySelectorAll("[data-nav]").forEach(el => el.onclick = () => { app.view = el.dataset.nav; render(); });
        document.querySelectorAll("[data-select],[data-view-patient]").forEach(el => el.onclick = event => { event.stopPropagation(); app.selectedId = el.dataset.select || el.dataset.viewPatient; if (el.dataset.nav) app.view = el.dataset.nav; render(); });
        document.querySelectorAll("[data-id]").forEach(row => row.onclick = event => { if (!event.target.dataset.star) { app.selectedId = row.dataset.id; render(); } });
        document.querySelectorAll("[data-star]").forEach(btn => btn.onclick = event => { event.stopPropagation(); const p = patientOf(btn.dataset.star); p.focus = !p.focus; render(); });
        document.querySelectorAll("[data-timeline]").forEach(btn => btn.onclick = () => { app.timelineType = btn.dataset.timeline; render(); });
        document.querySelectorAll("[data-alert-action]").forEach(btn => btn.onclick = () => handleAlert(btn.dataset.alertAction));
        document.querySelectorAll("[data-create-follow]").forEach(btn => btn.onclick = () => showFollowModal(btn.dataset.createFollow));
        document.querySelectorAll("[data-create-plan]").forEach(btn => btn.onclick = () => { createPlan(btn.dataset.createPlan, btn.dataset.alertId); render(); });
        document.querySelectorAll("[data-approve-plan]").forEach(btn => btn.onclick = () => approvePlan(btn.dataset.approvePlan));
        document.querySelectorAll("[data-edit-plan]").forEach(btn => btn.onclick = () => approvePlan(btn.dataset.editPlan, true));
        document.querySelectorAll("[data-reject-plan]").forEach(btn => btn.onclick = () => { const plan = planData.find(p => p.id === btn.dataset.rejectPlan); plan.status = "已驳回"; addEvent(plan.patientId, "方案", "驳回方案草稿", `${plan.name} 已驳回，原因：资料不足或不适用。`); toast("方案草稿已驳回并留痕"); render(); });
        document.querySelectorAll("[data-adjust-plan]").forEach(btn => btn.onclick = () => { const old = planData.find(p => p.id === btn.dataset.adjustPlan); createPlan(old.patientId, null, true); planData[0].name = `${old.name} 新版本草稿`; planData[0].version = old.version + 1; toast("已生成新版本草稿"); render(); });
        document.querySelectorAll("[data-review-plan]").forEach(btn => btn.onclick = () => toast("已进入方案复盘，展示目标完成率与关键变更摘要"));
        document.querySelectorAll("[data-complete-follow]").forEach(btn => btn.onclick = () => completeFollow(btn.dataset.completeFollow));
        document.querySelectorAll("[data-reschedule-follow]").forEach(btn => btn.onclick = () => { const f = followData.find(item => item.id === btn.dataset.rescheduleFollow); f.status = "已改期"; f.time = "3 天后 10:00"; addEvent(f.patientId, "随访", "随访已改期", `${f.type} 改期至 ${f.time}，原因：患者准备材料不足。`); toast("随访已改期并同步患者端"); render(); });
        document.querySelectorAll("[data-cancel-follow]").forEach(btn => btn.onclick = () => { const f = followData.find(item => item.id === btn.dataset.cancelFollow); f.status = "已取消"; addEvent(f.patientId, "随访", "随访已取消", `${f.type} 已取消，原因已留痕。`); toast("随访已取消并留痕"); render(); });
        const search = document.getElementById("searchInput2");
        if (search) search.oninput = event => { app.search = event.target.value; render(); };
        document.querySelector("[data-clear]")?.addEventListener("click", () => { app.search = ""; render(); });
        document.getElementById("addPatientBtn2")?.addEventListener("click", () => document.getElementById("qrModal").classList.add("show"));
      }

      function render() {
        if (app.view === "dashboard") renderDashboard();
        else if (app.view === "alerts") renderAlerts();
        else if (app.view === "plans") renderPlans();
        else if (app.view === "followups") renderFollowups();
        else renderPatients();
        document.querySelectorAll(".nav-item[data-view]").forEach(item => item.classList.toggle("active", item.dataset.view === app.view));
        bindActions();
      }

      document.querySelectorAll(".nav-item[data-view]").forEach(item => item.addEventListener("click", () => { app.view = item.dataset.view; render(); }));
      render();
    })();
  </script>
</body>
</html>
